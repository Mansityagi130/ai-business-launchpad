services:
  - type: web
    name: ai-launchpad-api
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: node apps/api/dist/src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
